name: Student API CI Pipeline

on:
  workflow_dispatch:

  push:
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "Makefile"
      - "requirements.txt"
      - "run.py"
      - ".github/workflows/**"

jobs:
  build-test-lint-docker:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build API
        run: docker build -t student-api:1.0.0 .

      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: studentdb
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: pytest

      - name: Run Lint
        run: flake8 app tests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/student-api:1.0.0 .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-api:1.0.0